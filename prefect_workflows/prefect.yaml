pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect-app

deployments:
  - name: db_initial
    entrypoint: flows/db_maintain.py:initialize_db_flow
    description: "Initializes the database with necessary tables and indexes"
    work_pool:
      name: NOAA-pool

  - name: DRAP Extract
    entrypoint: flows/drap_extract.py:rap_extract_flow
    description: "Fetches live DRAP data from NOAA every minute"
    work_pool:
      name: NOAA-pool
    schedules:
      - interval: 60
        timezone: UTC
  
  - name: Aurora Extract
    entrypoint: flows/aurora_extract.py:aurora_extract_flow
    description: "Fetches live aurora data from NOAA every minute"
    work_pool:
      name: NOAA-pool
    schedules:
      - interval: 60
        timezone: UTC

  - name: Proton Flux Plot Extract
    entrypoint: flows/proton_flux_plot.py:ingest_proton_flux_plot_flow
    description: "Fetches live proton flux plot data from NOAA every 5 minutes"
    work_pool:
      name: NOAA-pool
    schedules:
      - interval: 300
        timezone: UTC

  - name: Kp Index Extract
    entrypoint: flows/kp_index.py:ingest_kp_index_flow
    description: "Fetches live Kp index data from NOAA every 3 hours"
    work_pool:
      name: NOAA-pool
    schedules:
      - cron: "0 */3 * * *"
        timezone: UTC

  - name: Alert Extract
    entrypoint: flows/alert.py:alerts_extract_flow
    description: "Fetches live alerts data from NOAA every 3 hours"
    work_pool:
      name: NOAA-pool
    schedules:
      - interval: 60
        timezone: UTC

  - name: DRAP Cleanup
    entrypoint: flows/db_maintain.py:db_maintenance_flow
    work_pool:
      name: NOAA-pool
    schedules:
      - interval: 86400
        timezone: UTC

  - name: X-ray Extract
    entrypoint: flows/xray_extract.py:xray_extract_flow
    description: "Fetches live X-ray-flares data from NOAA every minute"
    work_pool:
      name: NOAA-pool
    schedules:
      - interval: 60
        timezone: UTC

  - name: opensky-ingester
    entrypoint: flows/flights_capture.py:ingest_flow
    work_pool:
      name: flight-pool
    schedules:
      - interval: 120
        timezone: UTC

  - name: flightdata-daily-maintenance
    entrypoint: flows/flights_capture.py:maintenance_flow
    work_pool:
      name: flight-pool
    schedules:
      - cron: "0 0 * * *"
        timezone: UTC

  - name: airport-data-refresh
    entrypoint: flows/airports_extract.py:airports_extract_flow
    work_pool:
      name: flight-pool
    schedules:
      - interval: 86400
        timezone: UTC