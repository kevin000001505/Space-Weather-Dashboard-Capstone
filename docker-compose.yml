version: '3.8'

services:
  # Main Application Service
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: daen_capstone_app
    ports:
      - "5000:5000"  # Adjust port based on your application
    environment:
      - FLASK_APP=src/api/app.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://daen_user:daen_password@db:5432/daen_db
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - db
      - redis
    networks:
      - daen_network
    restart: unless-stopped
    command: python -m flask run --host=0.0.0.0

  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: daen_postgres_db
    environment:
      - POSTGRES_USER=daen_user
      - POSTGRES_PASSWORD=daen_password
      - POSTGRES_DB=daen_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - daen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daen_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache Service (optional)
  redis:
    image: redis:7-alpine
    container_name: daen_redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - daen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NGINX Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: daen_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - daen_network
    restart: unless-stopped

  # Jupyter Notebook Service (for development)
  jupyter:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: daen_jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./src:/app/src
    networks:
      - daen_network
    command: jupyter lab --ip=0.0.0.0 --allow-root --no-browser --NotebookApp.token='' --NotebookApp.password=''
    restart: unless-stopped

# Volumes for persistent data
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Custom network
networks:
  daen_network:
    driver: bridge
