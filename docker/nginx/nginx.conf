events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream prefect_server {
        server prefect-server:4200;
    }

    upstream fastapi_server {
        server fastapi:8000;
    }

    upstream frontend_server {
        server frontend:80;
    }
    
    upstream pgadmin_server {
        server pgadmin:80; 
    }

    map $http_referer $openapi_upstream {
    "~*/prefect/docs" prefect_server;
    default           fastapi_server;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Client body size limit
        client_max_body_size 10M;

        # App Dashboard
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://fastapi_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI and Prefect docs
        location = /api/docs {
            proxy_pass http://fastapi_server/docs;
            access_log off;
        }

        location = /prefect/docs {
            proxy_pass http://prefect_server/docs;
            access_log off;
        }

        # OpenAPI spec - route to Prefect if referer is from Prefect docs, otherwise route to FastAPI
        location = /openapi.json {
            proxy_pass http://$openapi_upstream/openapi.json;
            access_log off;
            proxy_set_header Host $openapi_upstream;
        }

        # Prefect Dashboard
        location /prefect/ {
            proxy_pass http://prefect_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Prefect API
        location /prefect/api/ {
            proxy_pass http://prefect_server/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prefect health check endpoint
        location = /prefect/health {
            proxy_pass http://prefect_server/api/health;
            access_log off;
        }

        location /pgadmin {
            proxy_pass http://pgadmin_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header X-Script-Name /pgadmin;
            proxy_redirect off;
        }
    }
}