name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-api:
    name: Run API Tests
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docker/api/requirements.txt
            
      - name: Install API Dependencies
        run: pip install -r docker/api/requirements.txt
            
      - name: Execute API Tests
        run: |
          # Placeholder for future FastAPI test implementation
          echo "pytest tests/api/"

  test-flows:
    name: Run Flows Tests
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docker/flows_package/requirements.txt
            
      - name: Install Flows Dependencies
        run: pip install -r docker/flows_package/requirements.txt
            
      - name: Execute Flows Tests
        run: |
          # Placeholder for future Prefect workflow test implementation
          echo "pytest tests/prefect/"

  test-frontend:
    name: Run Frontend Tests
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
            
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
            
      - name: Execute Frontend Tests & Build Validation
        working-directory: ./frontend
        run: |
          # Placeholder for future UI test implementation
          echo "npm run test"
          # Validates that the Vite build completes without fatal errors
          echo "npm run build"

  deploy:
    name: Deploy to VM
    needs: [test-api, test-flows, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Write pyopensky config
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          mkdir -p ./secrets
          echo "${{ secrets.PYOPENSKY_CONFIG }}" > ./secrets/pyopensky-settings

      - name: Build and Deploy Containers
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker compose build --parallel   # builds all images simultaneously (fine)
          docker compose up -d --no-build   # starts in depends_on order (db → prefect-init → prefect-worker)
          sleep 10
          docker compose logs postgis

      - name: System Cleanup
        run: |
          docker image prune -f
