name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"      
  pull_request:
    branches:
      - main

jobs:
  test-static:
    name: Folder Structure & Coverage Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pytest and dotenv
        run: pip install pytest dotenv

      - name: Test Folder Structure
        run: pytest tests/test_folder_structure.py

      - name: Detect Test Coverage
        run: pytest tests/test_coverage_enforcement.py -v

  test-api:
    name: Run API Tests
    needs: test-static
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: prefect
          POSTGRES_PASSWORD: prefect
          POSTGRES_DB: prefect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docker/api/requirements.txt
            
      - name: Install API Dependencies
        run: pip install -r docker/api/requirements.txt

      - name: Run init.sh
        run: |
          chmod +x ./docker/db-init-scripts/init.sh
          ./docker/db-init-scripts/init.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: prefect
          POSTGRES_USER: prefect
          POSTGRES_DB: prefect
          DEVELOPER_DB: app
          DEVELOPER_USER: developer
          DEVELOPER_PASSWORD: ${{ secrets.DEVELOPER_PASSWORD }}
          READONLY_PASSWORD: ${{ secrets.READONLY_PASSWORD }}

      - name: Execute API Tests
        run: |
          # Placeholder for future FastAPI test implementation
          echo "pytest tests/api/"
        env:
          PYTHONPATH: "."

  test-flows:
    name: Run Flows Tests
    needs: test-static
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: prefect
          POSTGRES_PASSWORD: prefect
          POSTGRES_DB: prefect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s


    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docker/flows_package/requirements.txt
            
      - name: Install Flows Dependencies
        run: pip install -r docker/flows_package/requirements.txt

      - name: Run init.sh
        run: |
          chmod +x ./docker/db-init-scripts/init.sh
          ./docker/db-init-scripts/init.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: prefect
          POSTGRES_USER: prefect
          POSTGRES_DB: prefect
          DEVELOPER_DB: app
          DEVELOPER_USER: developer
          DEVELOPER_PASSWORD: ${{ secrets.DEVELOPER_PASSWORD }}
          READONLY_PASSWORD: ${{ secrets.READONLY_PASSWORD }}

      - name: Run db_maintain.py
        run: python prefect_workflows/flows/db_maintain.py
        env:
          PYTHONPATH: "prefect_workflows:."
          DATABASE_URL: postgresql://developer:${{ secrets.DEVELOPER_PASSWORD }}@localhost:5432/app

      - name: Execute Flows Tests
        run: pytest tests/test_flows/ -v
        env:
          PYTHONPATH: "."
          DEVELOPER_USER: developer
          DEVELOPER_PASSWORD: ${{ secrets.DEVELOPER_PASSWORD }}
          DEVELOPER_DB: app
          PGHOST: localhost
          PGPORT: "5432"

  test-frontend:
    name: Run Frontend Tests
    needs: test-static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
            
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
            
      - name: Execute Frontend Tests & Build Validation
        working-directory: ./frontend
        run: |
          # Placeholder for future UI test implementation
          echo "npm run test"
          # Validates that the Vite build completes without fatal errors
          echo "npm run build"

  deploy:
    name: Deploy to VM
    needs: [test-static, test-api, test-flows, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Write pyopensky config
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          mkdir -p ./secrets
          echo "${{ secrets.PYOPENSKY_CONFIG }}" > ./secrets/pyopensky-settings

      - name: Build and Deploy Containers
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker compose up -d --build --force-recreate --remove-orphans

      - name: System Cleanup
        run: |
          docker image prune -f
