name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'docker-compose.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'docker-compose.yaml'

jobs:
  check-compose:
    name: Check if compose changes affect frontend
    runs-on: ubuntu-latest
    outputs:
      compose_only: ${{ steps.check.outputs.compose_only }}
      service_affected: ${{ steps.check.outputs.service_affected }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect change type
        id: check
        run: |
          NON_COMPOSE=$(git diff --name-only HEAD~1 -- 'frontend/' | head -1)
          if [ -n "$NON_COMPOSE" ]; then
            echo "compose_only=false" >> "$GITHUB_OUTPUT"
            echo "service_affected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git show HEAD~1:docker-compose.yaml > /tmp/old-compose.yaml
          OLD=$(awk '/^  frontend:/{found=1; print; next} found && /^  [^ ]/{exit} found{print}' /tmp/old-compose.yaml)
          NEW=$(awk '/^  frontend:/{found=1; print; next} found && /^  [^ ]/{exit} found{print}' docker-compose.yaml)
          rm -f /tmp/old-compose.yaml

          if [ "$OLD" != "$NEW" ]; then
            echo "compose_only=true" >> "$GITHUB_OUTPUT"
            echo "service_affected=true" >> "$GITHUB_OUTPUT"
          else
            echo "compose_only=true" >> "$GITHUB_OUTPUT"
            echo "service_affected=false" >> "$GITHUB_OUTPUT"
          fi

  test-static:
    name: Folder Structure & Coverage Enforcement
    needs: check-compose
    if: needs.check-compose.outputs.compose_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pytest dotenv
      - run: pytest tests/test_folder_structure.py
      - run: pytest tests/test_coverage_enforcement.py -v

  test-frontend:
    name: Run Frontend Tests
    needs: [check-compose, test-static]
    if: needs.check-compose.outputs.compose_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22.22.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build Validation
        working-directory: ./frontend
        run: |
          echo "npm run test"
          echo "npm run build"

  deploy-frontend:
    name: Deploy Frontend to VM
    needs: [check-compose, test-static, test-frontend]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.check-compose.outputs.service_affected == 'true' &&
      (needs.check-compose.outputs.compose_only == 'true' || (needs.test-static.result == 'success' && needs.test-frontend.result == 'success'))
    uses: ./.github/workflows/deploy.yml
    with:
      services: frontend
    secrets: inherit