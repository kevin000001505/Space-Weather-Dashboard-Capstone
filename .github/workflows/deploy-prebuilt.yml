name: Prebuilt Services CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yaml'
      - 'docker/nginx/**'
      - 'docker/db-init-scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.yaml'
      - 'docker/nginx/**'
      - 'docker/db-init-scripts/**'

jobs:
  check-compose:
    name: Check if compose changes affect prebuilt services
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      service_affected: ${{ steps.check.outputs.service_affected }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect change type
        id: check
        run: |
          AFFECTED=false
          for SVC in nginx postgis pgadmin redis dozzle; do
            OLD=$(awk -v s="  ${SVC}:" '$0==s{f=1; print; next} f && /^  [^ ]/{exit} f{print}' <(git show HEAD~1:docker-compose.yaml))
            NEW=$(awk -v s="  ${SVC}:" '$0==s{f=1; print; next} f && /^  [^ ]/{exit} f{print}' docker-compose.yaml)
            if [ "$OLD" != "$NEW" ]; then
              AFFECTED=true
              break
            fi
          done

          CHANGED_FILES=$(git diff --name-only HEAD~1)
          if echo "$CHANGED_FILES" | grep -q '^docker/nginx/\|^docker/db-init-scripts/'; then
            AFFECTED=true
          fi

          echo "service_affected=$AFFECTED" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate Compose File
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write env file
        run: |
          cat <<'ENDOFFILE' > .env
          ${{ secrets.ENV_FILE }}
          ENDOFFILE
          cat >> .env <<EOF
          PG_SHARED_BUFFERS=${{ vars.PG_SHARED_BUFFERS }}
          PG_WORK_MEM=${{ vars.PG_WORK_MEM }}
          PG_EFFECTIVE_CACHE_SIZE=${{ vars.PG_EFFECTIVE_CACHE_SIZE }}
          PG_MAINTENANCE_WORK_MEM=${{ vars.PG_MAINTENANCE_WORK_MEM }}
          PG_WAL_BUFFERS=${{ vars.PG_WAL_BUFFERS }}
          PG_CHECKPOINT_COMPLETION_TARGET=${{ vars.PG_CHECKPOINT_COMPLETION_TARGET }}
          EOF
      - name: Validate docker-compose syntax
        run: docker compose config --quiet

  deploy-prebuilt:
    name: Deploy Prebuilt Services to VM
    needs: [check-compose, validate]
    if: |
      always() &&
      !cancelled() &&
      needs.validate.result == 'success' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-compose.outputs.service_affected == 'true') ||
       github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/deploy.yml
    with:
      services: prebuilt
    secrets: inherit
