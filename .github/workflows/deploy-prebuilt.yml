name: Prebuilt Services CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yaml'
      - 'docker/nginx/**'
      - 'docker/db-init-scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'docker-compose.yaml'
      - 'docker/nginx/**'
      - 'docker/db-init-scripts/**'

jobs:
  validate:
    name: Validate Compose File
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write env file
        run: |
          cat <<'ENDOFFILE' > .env
          ${{ secrets.ENV_FILE }}
          ENDOFFILE
          cat >> .env <<EOF
          PG_SHARED_BUFFERS=${{ vars.PG_SHARED_BUFFERS }}
          PG_WORK_MEM=${{ vars.PG_WORK_MEM }}
          PG_EFFECTIVE_CACHE_SIZE=${{ vars.PG_EFFECTIVE_CACHE_SIZE }}
          PG_MAINTENANCE_WORK_MEM=${{ vars.PG_MAINTENANCE_WORK_MEM }}
          PG_WAL_BUFFERS=${{ vars.PG_WAL_BUFFERS }}
          PG_CHECKPOINT_COMPLETION_TARGET=${{ vars.PG_CHECKPOINT_COMPLETION_TARGET }}
          EOF
      - name: Validate docker-compose syntax
        run: docker compose config --quiet

  deploy-prebuilt:
    name: Deploy Prebuilt Services to VM
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    with:
      services: prebuilt
    secrets: inherit
