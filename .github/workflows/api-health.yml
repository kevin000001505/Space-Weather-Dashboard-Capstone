name: API Health Tests

on:
  workflow_dispatch:       # manual trigger — button in GitHub UI
  push:
    branches:
      - main              # also auto-runs on merge to main

jobs:
  test-api-health:
    name: Run API Health Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docker/flows_package/requirements.txt

      - name: Install Dependencies
        run: pip install -r docker/flows_package/requirements.txt

      - name: Write env and secrets
        run: |
          cat <<'ENDOFFILE' > .env
          ${{ secrets.ENV_FILE }}
          ENDOFFILE
          mkdir -p ./secrets
          cat <<'ENDOFFILE' > ./secrets/pyopensky-settings
          ${{ secrets.PYOPENSKY_CONFIG }}
          ENDOFFILE

      - name: Run API Health Tests
        run: pytest tests/test_api_health/ -v
        env:
          PYTHONPATH: "."